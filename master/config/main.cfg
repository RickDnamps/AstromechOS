[robot]
name = R2-D2

[master]
uart_port = /dev/ttyAMA0
uart_baud = 115200
heartbeat_interval_ms = 200
watchdog_timeout_ms = 500
log_level = INFO
repo_path = /home/artoo/r2d2

[teeces]
port = /dev/ttyUSB0
baud = 9600

[lights]
# Active lights driver: teeces | astropixels
backend = astropixels

[servo_dome]
i2c_bus = 1
i2c_address = 0x40

[deploy]
slave_user = artoo
slave_host = r2-slave.local
slave_path = /home/artoo/r2d2
# BCM pin of the physical button (Location to confirm: Dome/RP2040)
button_pin = 17
button_short_press_s = 2.0

[network]
hotspot_interface = wlan0
hotspot_ip = 192.168.4.1
internet_interface = wlan1

[api]
host = 0.0.0.0
port = 5000

[servo_panels]
# MG90S 180° angles (open=opening angle, close=closing angle, range 10–170°)
# Default values — each panel can be overridden in local.cfg:
# dome_panel_1_open  = 110
# dome_panel_1_close = 20

[version]
version_file = /home/artoo/r2d2/VERSION

[choreo]
audio_latency           = 0.10
# Body servos travel via UART to the Slave Pi before hitting I2C.
# Fire them this many seconds early so they move in sync with dome servos (direct I2C).
# Increase if body still lags; decrease if it leads. Typical range: 0.015–0.040.
body_servo_uart_lat     = 0.025
telem_check_interval    = 0.5
uart_fail_threshold     = 3
vesc_min_voltage        = 20.0
vesc_max_temp           = 80.0
vesc_max_current        = 30.0
