<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
               maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AstromechOS</title>
  <link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>

  <!-- ── Status bar ─────────────────────────────── -->
  <div id="status-bar">
    <div id="status-indicators">
      <span class="ind" id="ind-hb">HB</span>
      <span class="ind" id="ind-uart">UART</span>
      <span class="ind" id="ind-bt">BT</span>
      <span id="uart-pct"></span>
    </div>
    <div id="status-center">
      <div id="mode-badge" class="hidden"></div>
      <button id="estop-btn"       onclick="triggerEstop()">⬡ E-STOP</button>
      <button id="estop-reset-btn" onclick="resetEstop()" class="hidden">▶ RESET</button>
    </div>
    <div id="status-right">
      <span id="batt-display" class="batt-display"></span>
      <div id="status-host" onclick="showHostDialog()">192.168.4.1</div>
    </div>
  </div>

  <!-- ── Alert toast ────────────────────────────── -->
  <div id="alert-toast" class="hidden"></div>

  <!-- ── HUD ────────────────────────────────────── -->
  <div id="hud-drive">

    <!-- Camera stream (src set by JS using the configured host) -->
    <img id="cam-stream" style="display:none">
    <div id="cam-bg"></div>

    <!-- Stream taken overlay -->
    <div id="cam-taken" style="display:none;position:absolute;inset:0;z-index:10;background:rgba(0,0,0,0.78);flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#ff2244;font-family:monospace">
      <div style="font-size:11px;letter-spacing:3px;color:#667788">STREAM TAKEN</div>
      <button onclick="_takeCameraStream()" style="background:none;border:1px solid #00aaff;color:#00aaff;font-family:monospace;font-size:11px;letter-spacing:2px;padding:8px 18px;border-radius:6px;cursor:pointer">TAKE STREAM</button>
    </div>

    <!-- VESC safety banner -->
    <div id="vesc-safety-banner" class="hidden">
      <span id="vesc-safety-msg">DRIVE BLOCKED — VESC OFFLINE</span>
    </div>

    <!-- HUD corner brackets -->
    <div class="hud-corner tl"></div>
    <div class="hud-corner tr"></div>
    <div class="hud-corner bl"></div>
    <div class="hud-corner br"></div>

    <!-- Lock button -->
    <button id="lock-btn" onclick="cycleLockMode()">🔒</button>

    <!-- Bottom bar: quick pills -->
    <div id="quick-pills">
      <button class="pill-btn" id="pill-audio"  onclick="openDrawer('audio')">🔊 AUDIO</button>
      <button class="pill-btn" id="pill-choreo" onclick="openDrawer('choreo')">🎭 CHOREO</button>
      <button class="pill-btn" id="pill-lights" onclick="openDrawer('lights')">💡 LIGHTS</button>
    </div>

    <!-- Touch zones — left half (propulsion) / right half (dome) -->
    <div id="js-zone-left"  class="js-zone"><span class="js-hint">PROPULSION</span></div>
    <div id="js-zone-right" class="js-zone"><span class="js-hint">DOME</span></div>

    <!-- Floating joystick rings — hidden until finger touches zone -->
    <div id="js-left-wrap"  class="js-float"><div class="js-ring"><div class="js-knob"></div></div></div>
    <div id="js-right-wrap" class="js-float"><div class="js-ring"><div class="js-knob"></div></div></div>

    <!-- Temperature (HUD overlay) -->
    <div id="hud-temp"></div>

  </div><!-- /hud-drive -->

  <!-- ── Password modal (Child Lock) ───────────── -->
  <div id="lock-modal" class="hidden" onclick="if(event.target===this)closeLockModal()">
    <div id="lock-modal-box">
      <div id="lock-modal-title">CHILD LOCK ACTIVE</div>
      <input type="password" id="lock-pwd" placeholder="Password"
             onkeydown="if(event.key==='Enter')submitLockPwd()">
      <div id="lock-pwd-err" class="hidden">Incorrect password</div>
      <div id="lock-modal-btns">
        <button onclick="closeLockModal()">CANCEL</button>
        <button onclick="submitLockPwd()">UNLOCK</button>
      </div>
    </div>
  </div>

  <!-- ── Drawer backdrop ────────────────────────── -->
  <div id="drawer-backdrop" class="hidden" onclick="closeDrawer()"></div>

  <!-- ── Bottom drawer ──────────────────────────── -->
  <div id="bottom-drawer" class="hidden">
    <div id="drawer-header">
      <div id="drawer-handle"></div>
      <span id="drawer-title"></span>
      <button id="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div id="drawer-body">

      <!-- AUDIO content -->
      <div id="drawer-audio" class="drawer-pane">
        <div class="vol-row">
          <span>🔈</span>
          <input type="range" id="vol-slider" min="0" max="100" value="79"
                 oninput="setVolume(this.value)">
          <span id="vol-pct">79%</span>
          <button id="stop-audio-btn" onclick="stopAudio()">⏹</button>
        </div>
        <div id="cat-list"></div>
        <div id="sound-grid"></div>
      </div>

      <!-- CHOREO content -->
      <div id="drawer-choreo" class="drawer-pane">
        <div id="choreo-playing-bar" class="choreo-playing-bar hidden">
          <span id="choreo-playing-name"></span>
          <button onclick="stopChoreo()">⏹ STOP</button>
        </div>
        <div id="choreo-list"></div>
      </div>

      <!-- LIGHTS content -->
      <div id="drawer-lights" class="drawer-pane">
        <div class="light-section">
          <div class="section-title">LOGICS — FLD / RLD</div>
          <div class="btn-row">
            <button class="btn-light" onclick="teecesMode('random')">RANDOM</button>
            <button class="btn-light" onclick="teecesMode('leia')">LEIA</button>
            <button class="btn-light btn-off" onclick="teecesMode('off')">OFF</button>
          </div>
          <div class="text-row">
            <input type="text" id="teeces-text" placeholder="FLD text…" maxlength="20"
                   autocomplete="off" autocorrect="off" spellcheck="false">
            <button onclick="teecesText()">OK</button>
          </div>
        </div>
        <div class="light-section">
          <div class="section-title">PSI</div>
          <div class="psi-swatches">
            <button class="psi-btn"          onclick="teecesPS(0)">OFF</button>
            <button class="psi-btn psi-rand" onclick="teecesPS(1)">RAND</button>
            <button class="psi-btn psi-red"  onclick="teecesPS(2)">●</button>
            <button class="psi-btn psi-blue" onclick="teecesPS(3)">●</button>
          </div>
        </div>
      </div>

    </div><!-- /drawer-body -->
  </div><!-- /bottom-drawer -->

  <script src="/static/js/mobile.js"></script>
</body>
</html>
