name: Android Release

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - '.github/workflows/android-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "Android SDK at: $ANDROID_HOME"
          ls $ANDROID_HOME/build-tools/ || true

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1

      - name: Copy APK to compiled/
        run: |
          mkdir -p android/compiled
          cp android/app/build/outputs/apk/debug/app-debug.apk android/compiled/R2-D2_Control.apk

      - name: Commit APK
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/compiled/R2-D2_Control.apk
          git commit -m "ci: update R2-D2_Control.apk [skip ci]" || echo "Rien à committer"
          git push
