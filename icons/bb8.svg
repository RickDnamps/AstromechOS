<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Body sphere -->
  <circle cx="16" cy="21" r="10" fill="#f0e0c0" stroke="#d08010" stroke-width="1.3"/>
  <!-- Orange body segments -->
  <path d="M6.2 21 Q16 15 25.8 21" fill="none" stroke="#d08010" stroke-width="1.4"/>
  <path d="M6.2 21 Q16 27 25.8 21" fill="none" stroke="#d08010" stroke-width="1.4"/>
  <!-- Horizontal center band -->
  <line x1="6.2" y1="21" x2="25.8" y2="21" stroke="#d08010" stroke-width="1"/>
  <!-- Orange accent circles on body -->
  <circle cx="12" cy="18" r="2" fill="#d08010" opacity="0.7"/>
  <circle cx="20" cy="24" r="1.5" fill="#d08010" opacity="0.5"/>
  <circle cx="16" cy="21" r="1.8" fill="#d08010" opacity="0.8"/>
  <!-- Head (offset to right) -->
  <circle cx="18" cy="9" r="6" fill="#f5f5f5" stroke="#d08010" stroke-width="1.2"/>
  <!-- Head orange stripe -->
  <path d="M12.5 10.5 Q18 8 23.5 10.5" fill="none" stroke="#d08010" stroke-width="1.2"/>
  <!-- Eye -->
  <circle cx="17" cy="8" r="2.5" fill="#222" stroke="#555" stroke-width="0.5"/>
  <circle cx="16" cy="7" r="0.7" fill="white" opacity="0.5"/>
  <!-- Small sensor -->
  <circle cx="21" cy="8" r="1" fill="#d08010" opacity="0.7"/>
  <!-- Head-body connector -->
  <line x1="16" y1="14" x2="16" y2="16" stroke="#aaa" stroke-width="1"/>
</svg>
