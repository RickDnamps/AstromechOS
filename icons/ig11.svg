<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Feet -->
  <line x1="11" y1="30" x2="9" y2="32" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="30" x2="23" y2="32" stroke="#888" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lower legs -->
  <line x1="12" y1="24" x2="11" y2="30" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="24" x2="21" y2="30" stroke="#999" stroke-width="2" stroke-linecap="round"/>
  <!-- Hip joint -->
  <rect x="11" y="21" width="10" height="4" rx="2" fill="#4a4a4a" stroke="#888" stroke-width="0.9"/>
  <!-- Torso cylinder -->
  <rect x="12" y="13" width="8" height="9" rx="3" fill="#454545" stroke="#888" stroke-width="1.1"/>
  <!-- Torso detail lines -->
  <line x1="14" y1="15" x2="18" y2="15" stroke="#666" stroke-width="0.7"/>
  <line x1="14" y1="18" x2="18" y2="18" stroke="#666" stroke-width="0.7"/>
  <!-- Arms -->
  <line x1="12" y1="15" x2="6" y2="20" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="15" x2="26" y2="20" stroke="#888" stroke-width="2" stroke-linecap="round"/>
  <!-- Gun at right hand -->
  <rect x="24" y="19" width="4" height="1.5" rx="0.7" fill="#aaa"/>
  <!-- Neck -->
  <rect x="15" y="9" width="2" height="5" rx="0.5" fill="#555" stroke="#777" stroke-width="0.6"/>
  <!-- Head sphere -->
  <circle cx="16" cy="7" r="6.5" fill="#424242" stroke="#888" stroke-width="1.2"/>
  <!-- Sensor band across head -->
  <rect x="9.5" y="6" width="13" height="2.5" rx="1" fill="#333" stroke="#666" stroke-width="0.5"/>
  <!-- Multiple orange sensors/eyes -->
  <circle cx="12" cy="7.2" r="1.4" fill="#ff8800" opacity="0.9"/>
  <circle cx="16" cy="7.2" r="1.4" fill="#ff8800" opacity="0.9"/>
  <circle cx="20" cy="7.2" r="1.4" fill="#ff8800" opacity="0.9"/>
  <!-- Small highlights on sensors -->
  <circle cx="11.6" cy="6.8" r="0.4" fill="white" opacity="0.4"/>
  <circle cx="15.6" cy="6.8" r="0.4" fill="white" opacity="0.4"/>
  <circle cx="19.6" cy="6.8" r="0.4" fill="white" opacity="0.4"/>
  <!-- Top of head detail -->
  <line x1="13" y1="1.5" x2="19" y2="1.5" stroke="#666" stroke-width="0.8" stroke-linecap="round"/>
</svg>
