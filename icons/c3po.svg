<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Head -->
  <ellipse cx="16" cy="8" rx="6" ry="7" fill="#c8960c" stroke="#a07000" stroke-width="1.2"/>
