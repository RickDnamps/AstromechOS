  <circle cx="12.5" cy="7" r="2.2" fill="#111" stroke="#a07000" stroke-width="0.5"/>
  <circle cx="19.5" cy="7" r="2.2" fill="#111" stroke="#a07000" stroke-width="0.5"/>
  <!-- Eye glow -->
  <circle cx="12.5" cy="7" r="1" fill="#ff6600" opacity="0.85"/>
  <circle cx="19.5" cy="7" r="1" fill="#ff6600" opacity="0.85"/>
  <circle cx="12" cy="6.5" r="0.35" fill="white" opacity="0.5"/>
  <circle cx="19" cy="6.5" r="0.35" fill="white" opacity="0.5"/>
