  <!-- Chest panel details -->
  <line x1="16" y1="18" x2="16" y2="28" stroke="#a07000" stroke-width="0.5" opacity="0.5"/>
  <rect x="14" y="20" width="4" height="2" rx="0.5" fill="#a07000" opacity="0.4"/>
  <!-- Shoulder joints -->
  <circle cx="10" cy="18" r="1.5" fill="#b88008" stroke="#a07000" stroke-width="0.8"/>
  <circle cx="22" cy="18" r="1.5" fill="#b88008" stroke="#a07000" stroke-width="0.8"/>
