<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dome (flat top — R5 has a cylindrical/flat head) -->
  <rect x="8" y="5" width="16" height="11" rx="2" fill="#2a0d0d" stroke="#cc2200" stroke-width="1.3"/>
  <!-- Flat top line accent -->
  <line x1="8" y1="8" x2="24" y2="8" stroke="#cc2200" stroke-width="0.8" opacity="0.5"/>
  <!-- Central eye/lens -->
  <circle cx="16" cy="12" r="2.5" fill="#1a0000" stroke="#ff3300" stroke-width="1"/>
  <circle cx="16" cy="12" r="1" fill="#ff3300"/>
  <circle cx="15.2" cy="11.3" r="0.35" fill="white" opacity="0.5"/>
  <!-- Side sensors -->
  <circle cx="10.5" cy="11" r="1.3" fill="none" stroke="#cc2200" stroke-width="0.9"/>
  <circle cx="21.5" cy="11" r="1.3" fill="none" stroke="#cc2200" stroke-width="0.9"/>
  <!-- Red dome panel -->
  <rect x="11" y="6" width="10" height="2" rx="0.5" fill="#cc2200" opacity="0.35"/>
  <!-- Body -->
  <rect x="8" y="16" width="16" height="11" rx="2" fill="#2a0d0d" stroke="#cc2200" stroke-width="1.3"/>
  <!-- Body center panel -->
  <rect x="12" y="18" width="8" height="5" rx="1" fill="#1a0000" stroke="#cc2200" stroke-width="0.8"/>
  <line x1="16" y1="18" x2="16" y2="23" stroke="#cc2200" stroke-width="0.6" opacity="0.5"/>
  <rect x="13.5" y="19.5" width="2" height="2" rx="0.5" fill="#cc2200" opacity="0.5"/>
  <rect x="16.5" y="19.5" width="2" height="2" rx="0.5" fill="#ff3300" opacity="0.35"/>
  <!-- Side red panels -->
  <rect x="8.5" y="18" width="2.5" height="4" rx="0.5" fill="#cc2200" opacity="0.4"/>
  <rect x="21" y="18" width="2.5" height="4" rx="0.5" fill="#cc2200" opacity="0.4"/>
  <!-- Legs -->
  <rect x="8" y="25" width="5" height="5" rx="1.5" fill="#2a0d0d" stroke="#cc2200" stroke-width="1"/>
  <rect x="19" y="25" width="5" height="5" rx="1.5" fill="#2a0d0d" stroke="#cc2200" stroke-width="1"/>
  <line x1="9" y1="27" x2="12" y2="27" stroke="#cc2200" stroke-width="0.6" opacity="0.5"/>
  <line x1="20" y1="27" x2="23" y2="27" stroke="#cc2200" stroke-width="0.6" opacity="0.5"/>
</svg>
