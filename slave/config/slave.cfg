[audio]
audio_channels = 6

[i2c_servo_hats]
# Motor HAT I2C address — informational only, never used for servos.
# The software uses this to warn you if you accidentally put this address in slave_hats.
# Waveshare Motor HAT default: 0x40
slave_motor_hat = 0x40

# Servo HAT I2C address(es) — comma-separated if you have more than one.
# HAT 1 → Servo_S0–S15, HAT 2 → Servo_S16–S31
# Default Waveshare Servo HAT: 0x41 (moved from 0x40 to avoid conflict with Motor HAT)
# Example with two servo HATs: slave_hats = 0x41, 0x42
slave_hats = 0x41
